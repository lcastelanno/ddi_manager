<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Codes - Global Number Validator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/libphonenumber-js/1.10.49/libphonenumber-js.min.js"></script>

    <style>
        :root {
            --primary: #f8fafc;
            --primary-hover: #ffffff;
            --accent: #9333ea;
            --accent-hover: #7e22ce;
            --bg-body: #27272a;
            --bg-card: #3f3f46;
            --input-bg: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #52525b;
            --success-bg: rgba(59, 130, 246, 0.15);
            --success-text: #60a5fa;
            --warning-bg: rgba(217, 119, 6, 0.2);
            --warning-text: #fbbf24;
            --error-bg: rgba(228, 0, 43, 0.15);
            --error-text: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Menu de Navegação - Sem Matrix */
        .top-nav {
            background: var(--input-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 0;
        }

        .nav-container {
            display: flex;
            gap: 8px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 6px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            background: var(--bg-card);
            color: var(--primary);
            border-color: var(--border-color);
        }

        .nav-link.active {
            background: rgba(147, 51, 234, 0.15);
            color: #d8b4fe;
            border-color: rgba(147, 51, 234, 0.3);
        }

        header {
            background: var(--bg-card);
            border-bottom: 4px solid var(--accent);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            padding: 20px 0;
            margin-bottom: 32px;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo-container {
            background: #ffffff;
            padding: 8px 24px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px;
        }

        .logo-img {
            max-height: 100%;
            max-width: 280px;
            object-fit: contain;
        }

        .header-title {
            border-left: 2px solid var(--border-color);
            padding-left: 24px;
        }

        .header-title h1 {
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .brand-audio {
            font-weight: 800;
            color: #f8fafc;
        }

        .brand-codes {
            font-weight: 400;
            color: #f8fafc;
        }

        .model {
            color: #00A4E4;
            font-weight: 700;
            font-size: 20px;
            border-left: 1px solid var(--border-color);
            margin-left: 8px;
            padding-left: 8px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            background: rgba(0, 0, 0, 0.15);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            color: var(--primary);
        }

        .card-body {
            padding: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .search-container {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .form-input {
            background-color: var(--input-bg);
            color: var(--primary);
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 24px;
            font-family: monospace;
            outline: none;
            width: 100%;
            font-weight: bold;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.25);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .result-box {
            display: none;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid;
            margin-top: 24px;
            animation: fadeIn 0.3s ease;
        }

        .result-success {
            background: var(--success-bg);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .result-error {
            background: var(--error-bg);
            border-color: rgba(228, 0, 43, 0.3);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .result-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .val-highlight {
            color: var(--success-text);
        }

        .val-purple {
            color: #d8b4fe;
        }

        .copy-icon {
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
            float: right;
        }

        .copy-icon:hover {
            color: var(--success-text);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .hint {
            font-size: 12px;
            color: var(--warning-text);
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div class="nav-container">
            <a href="ddi_splitter.html" class="nav-link">DDI Splitter</a>
            <a href="ddi_lookup.html" class="nav-link active">DDI Lookup Validator</a>
        </div>
    </nav>

    <header>
        <div class="container header-content">
            <div class="logo-container">
                <img src="image_2d6d7d.png" alt="DDI Manager Logo" class="logo-img"
                    onerror="this.onerror=null; this.outerHTML='<div style=\'font-weight:bold; color:#001871; font-size:20px;\'>ddiManager</div>';">
            </div>
            <div class="header-title">
                <h1><span class="brand-audio">Audio</span> <span class="brand-codes">Codes</span><span
                        class="model">405HD</span></h1>
                <p>Analisador de Números & Roteamento SIP</p>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header">Consultar Número de Telefone (Lookup)</div>
            <div class="card-body">
                <div class="form-group">
                    <label>Introduza o número com DDI (ex: +5511987654321 ou +27533441390):</label>
                    <div class="search-container">
                        <input type="text" id="phone-input" class="form-input" placeholder="+00 00 00000 0000"
                            onkeypress="handleEnter(event)">
                        <button class="btn btn-primary" onclick="searchNumber()">Analisar</button>
                    </div>
                    <div class="hint">Dica: Suporte nativo para ranges corporativos (Sishen/Kolomela).</div>
                </div>
                <div id="result-box" class="result-box"></div>
            </div>
        </div>
    </main>

    <script>
        function handleEnter(e) { if (e.key === "Enter") searchNumber(); }

        function searchNumber() {
            const input = document.getElementById('phone-input').value.trim();
            if (!input) return;

            let formattedInput = input.startsWith('+') ? input : '+' + input.replace(/\D/g, '');

            try {
                const phone = libphonenumber.parsePhoneNumber(formattedInput);
                if (!phone.isValid()) {
                    showError("Número inválido ou incompleto para o país detectado.");
                    return;
                }
                showSuccess(phone);
            } catch (err) {
                showError("Erro no formato. Use o código internacional (ex: +27...)");
            }
        }

        function showSuccess(p) {
            const rb = document.getElementById('result-box');
            rb.className = 'result-box result-success';
            rb.style.display = 'block';

            const e164 = p.format('E.164');
            const uri = p.getURI();
            const rawType = p.getType() || 'UNKNOWN';
            const rawNumber = p.number.substring(1);

            let typeLabel = rawType.replace('_', ' ');
            let locationLabel = "Região Geral";
            let areaCodeLabel = "N/A";

            // Lógica específica para sites Telecom (Sishen/Kolomela)
            if (rawNumber.startsWith('2753')) {
                typeLabel = 'CORPORATE RANGE';
                locationLabel = 'Sishen / Kathu (Northern Cape)';
                areaCodeLabel = 'Area Code 53';
            } else if (rawNumber.startsWith('2714')) {
                typeLabel = 'CORPORATE RANGE';
                locationLabel = 'Kolomela / Postmasburg';
                areaCodeLabel = 'Area Code 14';
            } else if (p.country === 'BR') {
                const ddd = rawNumber.substring(2, 4);
                areaCodeLabel = `DDD ${ddd}`;
                if (ddd === '11') locationLabel = 'São Paulo e Região';
                else if (ddd === '19') locationLabel = 'Campinas e Região';
            } else {
                locationLabel = `International (${p.country})`;
            }

            rb.innerHTML = `
                <div class="result-label">Formato Internacional (E.164)</div>
                <div class="result-value" style="font-size: 32px; color: var(--success-text); letter-spacing: 1px;">
                    ${p.formatInternational()}
                    <svg class="copy-icon" onclick="copyText('${e164}')" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
                
                <div class="divider"></div>
                
                <div class="result-grid">
                    <div class="result-item">
                        <div class="result-label">País / ISO</div>
                        <div class="result-value val-highlight">${p.country} (+${p.countryCallingCode})</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Tipo de Linha</div>
                        <div class="result-value val-purple">${typeLabel}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Localização</div>
                        <div class="result-value" style="font-size: 15px;">${locationLabel}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Área / Prefixo</div>
                        <div class="result-value" style="font-family:monospace;">${areaCodeLabel}</div>
                    </div>
                </div>
            `;
        }

        function showError(msg) {
            const rb = document.getElementById('result-box');
            rb.className = 'result-box result-error';
            rb.style.display = 'block';
            rb.innerHTML = `<span style="font-weight:bold; color:var(--error-text)">${msg}</span>`;
        }

        function copyText(t) {
            navigator.clipboard.writeText(t);
            const icon = event.currentTarget;
            icon.style.color = "var(--success-text)";
            setTimeout(() => { icon.style.color = "var(--text-muted)"; }, 800);
        }
    </script>
</body>

</html>
